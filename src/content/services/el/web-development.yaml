  - label: "Αρχική"
    url: "/el"
  - label: "Υπηρεσίες"
    url: "/el/services"
blocks:
  - component: marquee
    items:
      - "Εμπορική Περιουσία"
      - "Γενική Αστική Ευθύνη"
      - "Επαγγελματική Ευθύνη"
      - "Παροχές Εργαζομένων"
      - "Ασφάλεια Κυβερνοχώρου"
      - "Κάλυψη Στόλου"

  - component: serviceDescription
    title: "Εξατομικευμένη Προστασία για την Επιχείρησή σας"
    description: "Είτε είστε startup, ΜΜΕ ή μεγάλη επιχείρηση, η Main Insurance σχεδιάζει εμπορικά πακέτα που καλύπτουν τους μοναδικούς κινδύνους σας. Από περιουσία και ευθύνη μέχρι πρόνοια εργαζομένων και κυβερνοαπειλές."
    image: "/assets/img/abstracts/content-shape-1.svg"
    approachTitle: "Η Προσέγγισή μας"
    approachDescription: "Ξεκινάμε κατανοώντας τον κλάδο, τις λειτουργίες και το προφίλ κινδύνου σας. Στη συνέχεια δημιουργούμε μια πολυεπίπεδη στρατηγική κάλυψης."
    strategyTitle: "Γιατί οι Επιχειρήσεις μας Επιλέγουν"
    strategyDescription: "Η εξειδικευμένη εταιρική ομάδα μας έχει τοποθετήσει ασφαλιστήρια για πάνω από 500 επιχειρήσεις σε όλη την Ελλάδα."
    checklist:
      - "Ολοκληρωμένη αξιολόγηση κινδύνου"
      - "Σύγκριση πολλαπλών παρόχων"
      - "Αποκλειστικός υπεύθυνος λογαριασμού"
      - "Ετήσια επανεξέταση κάλυψης"
      - "Γραμμή αποζημιώσεων 24/7"
      - "Καθοδήγηση κανονιστικής συμμόρφωσης"

  - component: serviceApproach
    title: "Πώς Συνεργαζόμαστε Μαζί σας"
    description: "Η δομημένη διαδικασία μας διασφαλίζει ότι κανένας κίνδυνος δεν παραβλέπεται και κάθε ευρώ ασφαλίστρων αποδίδει αξία."
    image: "/assets/img/abstracts/content-shape-1.svg"
    items:
      - icon: "/assets/img/images/home-4/content-icon-1.svg"
        iconAlt: "Βήμα 1"
        title: "Αξιολόγηση Κινδύνου"
        description: "Διενεργούμε ενδελεχή έλεγχο των λειτουργιών, περιουσιακών στοιχείων και πιθανών υποχρεώσεων της επιχείρησής σας."
      - icon: "/assets/img/images/home-4/content-icon-2.svg"
        iconAlt: "Βήμα 2"
        title: "Σχεδιασμός Ασφαλιστηρίου"
        description: "Συγκρίνουμε προσφορές από 15+ παρόχους και δημιουργούμε πακέτο βελτιστοποιημένο για κάλυψη και κόστος."
      - icon: "/assets/img/images/home-4/content-icon-3.svg"
        iconAlt: "Βήμα 3"
        title: "Υλοποίηση"
        description: "Αναλαμβάνουμε όλη τη γραφειοκρατία και τον συντονισμό παρόχων ώστε εσείς να εστιάσετε στη λειτουργία της επιχείρησής σας."
      - icon: "/assets/img/images/home-1/content-icon-1.svg"
        iconAlt: "Βήμα 4"
        title: "Συνεχής Υποστήριξη"
        description: "Ετήσιες αναθεωρήσεις, διαχείριση αποζημιώσεων και απευθείας γραμμή με τον υπεύθυνό σας όλο τον χρόνο."

  - component: faq
    title: "Συχνές Ερωτήσεις Ασφάλισης Επιχειρήσεων"
    faqs:
      - question: "Ποιους κλάδους εξυπηρετείτε;"
        answer: "Εξυπηρετούμε όλους τους κλάδους, συμπεριλαμβανομένων φιλοξενίας, logistics, τεχνολογίας, λιανικής, υγείας και επαγγελματικών υπηρεσιών."
      - question: "Μπορείτε να καλύψετε πολλαπλές τοποθεσίες;"
        answer: "Ναι, χειριζόμαστε τακτικά ασφαλιστήρια πολλαπλών τοποθεσιών σε όλη την Ελλάδα και μπορούμε να συντονίσουμε διεθνή κάλυψη."
      - question: "Προσφέρετε πακέτα παροχών εργαζομένων;"
        answer: "Απολύτως. Σχεδιάζουμε ομαδικά προγράμματα υγείας, ζωής και συνταξιοδότησης ως μέρος της συνολικής σας επιχειρηματικής στρατηγικής."
    hasBg: true

  - component: cta
    title: "Ας προστατεύσουμε μαζί την επιχείρησή σας."
    buttonLink: "/el/contact"
