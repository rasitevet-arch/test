  - component: features
    title: "Γιατί να Επιλέξετε τη Main Insurance;"
    paragraphs:
      - "Η ομάδα μας αποτελείται από πιστοποιημένους επαγγελματίες με πάνω από 30 χρόνια εμπειρίας στην ελληνική ασφαλιστική αγορά."
      - "Συνδυάζουμε σύγχρονη τεχνολογία με προσωπική εξυπηρέτηση για να προσφέρουμε ασφαλιστήρια που ταιριάζουν πραγματικά στις ανάγκες σας."
