  - component: services
    title: "Οι Ασφαλιστικές μας Υπηρεσίες"
    services:
      - icon: "/assets/img/icons/service-icon-1.svg"
        name: "Ασφάλεια Αυτοκινήτου"
        description: "Ολοκληρωμένη κάλυψη οχημάτων με ανταγωνιστικά ασφάλιστρα και γρήγορη διεκπεραίωση αποζημιώσεων."
        link: "/el/services/web-development"
      - icon: "/assets/img/icons/service-icon-2.svg"
        name: "Ασφάλεια Κατοικίας"
        description: "Προστατέψτε το σπίτι και τα υπάρχοντά σας από φωτιά, κλοπή, φυσικές καταστροφές και άλλα."
        link: "/el/services/web-development"
      - icon: "/assets/img/icons/service-icon-3.svg"
        name: "Ασφάλεια Υγείας"
        description: "Ατομικά και ομαδικά προγράμματα υγείας με πρόσβαση στους κορυφαίους παρόχους υγείας της Ελλάδας."
        link: "/el/services/web-development"
      - icon: "/assets/img/images/home-8/service-icon-1.svg"
        name: "Ασφάλεια Επιχειρήσεων"
        description: "Εξατομικευμένη εμπορική κάλυψη που περιλαμβάνει αστική ευθύνη, περιουσία και παροχές εργαζομένων."
        link: "/el/services/web-development"

  - component: testimonials
    title: "Τι Λένε οι Πελάτες μας"
    testimonials:
      - quote: "Η Main Insurance έκανε όλη τη διαδικασία απλή. Η ομάδα τους χειρίστηκε το επιχειρηματικό μας συμβόλαιο με απίστευτο επαγγελματισμό."
        name: "Μαρία Παπαδοπούλου"
        rating: 5
        avatar: "/assets/img/images/home-1/content-icon-1.svg"
      - quote: "Μετά από ένα τροχαίο, διεκπεραίωσαν την αποζημίωσή μου σε 48 ώρες. Δεν πίστευα πόσο γρήγορο και ανώδυνο ήταν."
        name: "Νίκος Γεωργίου"
        rating: 5
        avatar: "/assets/img/images/home-1/content-icon-2.svg"
      - quote: "Είμαστε με τη Main Insurance εδώ και 15 χρόνια. Η εμπειρογνωμοσύνη τους στην εμπορική κάλυψη είναι ασυναγώνιστη."
        name: "Ελένη Δημητρίου"
        rating: 5
        avatar: "/assets/img/images/home-1/content-icon-3.svg"
      - quote: "Το πρόγραμμα ασφάλειας υγείας μας εξοικονόμησε χιλιάδες. Η κάλυψη είναι ολοκληρωμένη και η ομάδα υποστήριξης πάντα διαθέσιμη."
        name: "Κώστας Μαρινάκης"
        rating: 5
        avatar: "/assets/img/images/home-1/feature-icon-1.svg"
      - quote: "Η μετάβαση στη Main Insurance ήταν η καλύτερη απόφαση για τον στόλο μας. Κατανοούν τα logistics όσο κανένας άλλος μεσίτης."
        name: "Άννα Θεοδώρου"
        rating: 4
        avatar: "/assets/img/images/home-1/feature-icon-2.svg"

  - component: faq
    title: "Συχνές Ερωτήσεις"
    faqs:
      - question: "Πώς μπορώ να πάρω προσφορά;"
        answer: "Απλά επισκεφθείτε τη σελίδα επικοινωνίας ή καλέστε μας απευθείας. Θα αξιολογήσουμε τις ανάγκες σας και θα σας δώσουμε εξατομικευμένη προσφορά εντός 24 ωρών."
      - question: "Τι είδη ασφαλειών προσφέρετε;"
        answer: "Προσφέρουμε ασφάλεια αυτοκινήτου, κατοικίας, υγείας, ζωής, επιχειρήσεων και θαλάσσια ασφάλεια. Παρέχουμε επίσης εξειδικευμένα πακέτα για επαγγελματίες και ελεύθερους επαγγελματίες."
      - question: "Πόσο διαρκεί η διαδικασία αποζημίωσης;"
        answer: "Οι περισσότερες αποζημιώσεις ολοκληρώνονται σε 5-10 εργάσιμες ημέρες. Οι επείγουσες αποζημιώσεις, όπως τροχαία ατυχήματα, διεκπεραιώνονται εντός 48 ωρών."
      - question: "Μπορώ να διαχειριστώ το συμβόλαιό μου online;"
        answer: "Ναι, η πύλη πελατών μας σάς επιτρέπει να βλέπετε τα συμβόλαιά σας, να υποβάλλετε αποζημιώσεις και να κατεβάζετε έγγραφα ανά πάσα στιγμή."
    hasBg: false

