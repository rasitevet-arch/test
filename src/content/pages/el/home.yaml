title: "Main Insurance — Αξιόπιστη Προστασία"
description: "Η Main Insurance παρέχει ολοκληρωμένη ασφαλιστική κάλυψη για ιδιώτες και επιχειρήσεις σε όλη την Ελλάδα."
seo:
  title: "Main Insurance — Αξιόπιστη Ασφαλιστική Προστασία για Ιδιώτες & Επιχειρήσεις"
  description: "Κορυφαίος ασφαλιστικός σύμβουλος στην Ελλάδα. Αυτοκινήτου, κατοικίας, υγείας & επιχειρήσεων. Ζητήστε δωρεάν προσφορά."
  image: /assets/img/og-default.jpg
  keywords:
    - ασφάλεια ελλάδα
    - ασφάλεια αυτοκινήτου
    - ασφάλεια κατοικίας
    - ασφάλεια υγείας
    - ασφάλεια επιχειρήσεων
  robots: "index, follow"
  twitterCard: summary_large_image
  twitterSite: "@maininsurance"
  ogType: website
  ogSiteName: Main Insurance
  ogLocale: el_GR
isLanding: true
blocks:
  - component: hero
    title: "Προστατεύουμε ό,τι Έχει Αξία"
    description: "Παρέχουμε εξατομικευμένες ασφαλιστικές λύσεις για ιδιώτες και επιχειρήσεις. Με δεκαετίες εμπειρίας, η Main Insurance είναι ο αξιόπιστος συνεργάτης σας."
    ctaLink: "/el/contact"
    ctaLabel: "Ζητήστε Προσφορά"
    secondaryLink: "/el/about"
    secondaryLabel: "Μάθετε Περισσότερα"
    decorativeElements:
