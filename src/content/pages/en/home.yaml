  - component: testimonials
    title: What Our Clients Say
    testimonials:
      - quote: Main Insurance made the entire process seamless. Their team handled our
          business policy with incredible professionalism.
        name: Maria Papadopoulos
        role: CEO, TechStart Greece
        avatar: /assets/img/images/home-1/content-icon-1.svg
      - quote: After a car accident, they processed my claim within 48 hours. I couldn't
          believe how fast and stress-free it was.
        name: Nikos Georgiou
        role: Private Client
        avatar: /assets/img/images/home-1/content-icon-2.svg
      - quote: We've been with Main Insurance for 15 years. Their expertise in
          commercial coverage is unmatched in the market.
        name: Elena Dimitriou
        role: CFO, Aegean Logistics
        avatar: /assets/img/images/home-1/content-icon-3.svg
      - quote: Their health insurance plan saved us thousands. The coverage is
          comprehensive and the support team is always available.
        name: Kostas Marinakis
        role: Director, Olympus Hotels
        avatar: /assets/img/images/home-1/feature-icon-1.svg
      - quote: Switching to Main Insurance was the best decision for our fleet. They
          understand logistics like no other broker.
        name: Anna Theodorou
        role: Operations Manager, FastTrack
        avatar: /assets/img/images/home-1/feature-icon-2.svg
  - component: faq
    title: Frequently Asked Questions
    faqs:
      - question: How do I get a quote?
        answer: Simply visit our contact page or call us directly. We'll assess your
          needs and provide a tailored quote within 24 hours.
      - question: What types of insurance do you offer?
        answer: We offer auto, home, health, life, business, and marine insurance. We
          also provide specialized packages for professionals and freelancers.
      - question: How long does the claims process take?
        answer: Most claims are processed within 5-10 business days. Emergency claims,
          such as auto accidents, are handled within 48 hours.
      - question: Can I manage my policy online?
        answer: Yes, our client portal allows you to view your policies, submit claims,
          and download documents anytime.
    hasBg: false
